name: Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'package.json'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'package.json'
      - '.github/workflows/test.yml'

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test server
